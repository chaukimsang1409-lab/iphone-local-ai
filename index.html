<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Local AI">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>Sổ tay AI Local</title>
    <style>
        :root { --primary-color: #007aff; --bg-color: #f2f2f7; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 0; background: var(--bg-color); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #status { font-size: 13px; color: #8e8e93; text-align: center; padding: 10px; background: rgba(255,255,255,0.8); border-bottom: 1px solid #d1d1d6; font-weight: 500; }
        #chat-box { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .message { padding: 12px 16px; border-radius: 18px; max-width: 75%; font-size: 16px; line-height: 1.4; word-wrap: break-word; }
        .user-msg { background: var(--primary-color); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .ai-msg { background: white; color: black; align-self: flex-start; border-bottom-left-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        #input-area { padding: 10px 15px calc(10px + env(safe-area-inset-bottom)); background: white; border-top: 1px solid #d1d1d6; display: flex; gap: 8px; align-items: center; }
        input[type="text"] { flex: 1; padding: 12px 16px; border-radius: 22px; border: 1px solid #c7c7cc; font-size: 16px; outline: none; background: #f2f2f7; }
        button { background: var(--primary-color); color: white; border: none; padding: 12px 20px; border-radius: 22px; font-weight: 600; font-size: 16px; cursor: pointer; }
        button:disabled { background: #d1d1d6; }
    </style>
</head>
<body>
    <div id="status">Đang khởi tạo hệ thống...</div>
    <div id="chat-box"></div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Nhập tin nhắn..." disabled>
        <button id="send-btn" disabled>Gửi</button>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
